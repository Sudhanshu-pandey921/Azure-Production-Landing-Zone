trigger:
  branches:
    include:
      - main

pool:
  name: prod-pool

variables:
  backendServiceConnection: 'su-sc'
  backendRG: 'YOUR_BACKEND_RG'
  backendStorage: 'pipelinestg1'
  backendContainer: 'pipelinecnt1'
  backendKey: 'pipeline.tfstate'
  workingDir: '$(System.DefaultWorkingDirectory)'

#=========================
# Stage 1 - Terraform Init
#=========================
stages:
- stage: Init
  displayName: Terraform Init

  jobs:
  - job: Init
    displayName: Initialize Terraform

    steps:
    - checkout: self

    - task: TerraformTask@5
      displayName: Terraform Init
      inputs:
        provider: azurerm
        command: init

        backendServiceArm: $(backendServiceConnection)
        backendAzureRmResourceGroupName: $(backendRG)
        backendAzureRmStorageAccountName: $(backendStorage)
        backendAzureRmContainerName: $(backendContainer)
        backendAzureRmKey: $(backendKey)

        workingDirectory: $(workingDir)

#=========================
# Stage 2 - Validate
#=========================
- stage: Validate
  displayName: Terraform Validate
  dependsOn: Init

  jobs:
  - job: Validate
    displayName: Validate Terraform

    steps:
    - checkout: self

    - task: TerraformTask@5
      displayName: Terraform Init
      inputs:
        provider: azurerm
        command: init

        backendServiceArm: $(backendServiceConnection)
        backendAzureRmResourceGroupName: $(backendRG)
        backendAzureRmStorageAccountName: $(backendStorage)
        backendAzureRmContainerName: $(backendContainer)
        backendAzureRmKey: $(backendKey)

        workingDirectory: $(workingDir)

    - task: TerraformTask@5
      displayName: Terraform Validate
      inputs:
        provider: azurerm
        command: validate
        workingDirectory: $(workingDir)

#=========================
# Stage 3 - Plan
#=========================
- stage: Plan
  displayName: Terraform Plan
  dependsOn: Validate

  jobs:
  - job: Plan
    displayName: Terraform Plan

    steps:
    - checkout: self

    - task: TerraformTask@5
      displayName: Terraform Init
      inputs:
        provider: azurerm
        command: init

        backendServiceArm: $(backendServiceConnection)
        backendAzureRmResourceGroupName: $(backendRG)
        backendAzureRmStorageAccountName: $(backendStorage)
        backendAzureRmContainerName: $(backendContainer)
        backendAzureRmKey: $(backendKey)

        workingDirectory: $(workingDir)

    - task: TerraformTask@5
      displayName: Terraform Plan
      inputs:
        provider: azurerm
        command: plan
        workingDirectory: $(workingDir)
        environmentServiceNameAzureRM: $(backendServiceConnection)
        commandOptions: >
          -var-file=environments/dev/terraform.tfvars
          -out=dev.tfplan

#=========================
# Stage 4 - Apply
#=========================
- stage: Apply
  displayName: Terraform Apply
  dependsOn: Plan

  jobs:
  - deployment: Apply
    displayName: Apply Infrastructure

    environment: production

    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self

          - task: TerraformTask@5
            displayName: Terraform Init
            inputs:
              provider: azurerm
              command: init

              backendServiceArm: $(backendServiceConnection)
              backendAzureRmResourceGroupName: $(backendRG)
              backendAzureRmStorageAccountName: $(backendStorage)
              backendAzureRmContainerName: $(backendContainer)
              backendAzureRmKey: $(backendKey)

              workingDirectory: $(workingDir)

          - task: TerraformTask@5
            displayName: Terraform Apply
            inputs:
              provider: azurerm
              command: apply
              workingDirectory: $(workingDir)
              environmentServiceNameAzureRM: $(backendServiceConnection)
              commandOptions: dev.tfplan