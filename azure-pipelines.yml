trigger:
 branches:
   include:
     - main

pool:  prod-pool

stages:
  - stage: FirstStage
    displayName: Init
    jobs:
      - job: init
        displayName: Terraform Init
        steps:

          - task: AzureCLI@2
            inputs:
              azureSubscription: 'su-sc'
              scriptType: ps
              scriptLocation: inlineScript
              inlineScript: |
                az account show
          - task: TerraformTask@5
            inputs:
              provider: 'azurerm'
              command: 'init'
              commandOptions: '-backend-config=backend/dev.hcl'
              backendServiceArm: 'su-sc'
              backendAzureRmStorageAccountName: 'pipelinestg1'
              backendAzureRmContainerName: 'pipelinecnt1'
              backendAzureRmKey: 'pipeline.tfstate'

        