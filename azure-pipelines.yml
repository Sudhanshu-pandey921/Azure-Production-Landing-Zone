trigger:
 branches:
   include:
     - main

pool:  prod-pool

stages:
  - stage: FirstStage
    displayName: Init
    jobs:
      - job: init
        displayName: Terraform Init
        steps:
          - task: TerraformTask@5
            inputs:
              provider: 'azurerm'
              command: 'init'
              backendServiceArm: 'su-sc'
              backendAzureRmStorageAccountName: 'pipelinestg1'
              backendAzureRmContainerName: 'pipelinecnt1'
              backendAzureRmKey: 'pipeline.tfstate'

          - task: AzureCLI@2
            inputs:
              azureSubscription: 'su-sc'
              scriptType: 'ps'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az account show
                az storage container list --account-name pipelinestg1 --auth-mode login