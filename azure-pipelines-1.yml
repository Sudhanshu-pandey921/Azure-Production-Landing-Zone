trigger:
 branches:
   include:
     - main
   
pool: prod-pool


## stage 1- fmt
stages:
  - stage: fmt
    displayName: terraform fmt

    jobs:
      - job: fmt
        steps:
        
        - checkout: self

        - task: PowerShell@2
          inputs:
            targetType: 'inline'
            script: 'terraform fmt -check -recursive'

## stage 2- init
  - stage: init
    displayName: Init
    dependsOn: fmt
     
    jobs:
      - job: terraforminit
        steps:
        - checkout: self

        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'init'
            backendServiceArm: 'su-sc'
            backendAzureRmResourceGroupName: 'backendrg1'
            backendAzureRmStorageAccountName: 'backendstg1'
            backendAzureRmContainerName: 'backendcnt10'
            backendAzureRmKey: 'pipeline.tfstate'
          
